<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revolt Loader</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* 🔥 SMOOTH ANIMATED BACKGROUND */
.bg {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 30%, rgba(255,0,0,0.15), transparent 40%),
              radial-gradient(circle at 70% 70%, rgba(255,0,0,0.12), transparent 40%);
  animation: moveBg 12s linear infinite;
  z-index: 0;
}

@keyframes moveBg {
  0% { transform: translate(0%, 0%); }
  50% { transform: translate(-20%, -20%); }
  100% { transform: translate(0%, 0%); }
}

/* 🔥 PARTICLES */
.particles span {
  position: absolute;
  width: 2px;
  height: 2px;
  background: red;
  animation: float 10s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* CARD */
.card {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(255,0,0,0.6);
  width: 340px;
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

/* LOGO */
.logo {
  width: 120px;
  margin-bottom: 20px;
  animation: floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* TITLE */
h1 {
  color: #ff2e2e;
  text-shadow: 0 0 20px red;
  margin-bottom: 10px;
}

/* BUTTONS */
.btn {
  display: block;
  margin: 10px auto;
  padding: 14px;
  width: 100%;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
  font-size: 14px;
}

/* DOWNLOAD */
.download {
  background: linear-gradient(45deg, #ff0000, #990000);
  box-shadow: 0 0 20px red;
  animation: pulse 2s infinite;
}

/* TELEGRAM */
.telegram {
  background: linear-gradient(45deg, #0088cc, #005f99);
  box-shadow: 0 0 15px #0088cc;
}

/* CHANNEL */
.channel {
  background: linear-gradient(45deg, #6a00ff, #3b0099);
  box-shadow: 0 0 15px #6a00ff;
}

/* BUY */
.buy {
  background: linear-gradient(45deg, #ffcc00, #cc9900);
  color: black;
  box-shadow: 0 0 15px #ffcc00;
}

/* HOVER */
.btn:hover {
  transform: scale(1.05);
}

/* PULSE */
@keyframes pulse {
  0% { box-shadow: 0 0 10px red; }
  50% { box-shadow: 0 0 25px red; }
  100% { box-shadow: 0 0 10px red; }
}

/* LOADER */
.loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  flex-direction: column;
}

.loader h2 {
  color: red;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

.hide {
  display: none;
}

/* FLOATING TG */
.floating {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #0088cc;
  padding: 12px 15px;
  border-radius: 50px;
  text-decoration: none;
  color: white;
  box-shadow: 0 0 15px #0088cc;
  z-index: 5;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="particles">
  <span style="left:10%;animation-delay:0s"></span>
  <span style="left:30%;animation-delay:2s"></span>
  <span style="left:50%;animation-delay:4s"></span>
  <span style="left:70%;animation-delay:6s"></span>
  <span style="left:90%;animation-delay:8s"></span>
</div>

<!-- LOADER -->
<div class="loader" id="loader">
  <h2>REVOLT LOADING...</h2>
</div>

<!-- MAIN -->
<div class="card">

  <img src="logo.jpg" class="logo">

  <h1>REVOLT LOADER</h1>
  <p style="color:#aaa;">Dominate the Game</p>

  <a class="btn download" onclick="downloadAPK()">DOWNLOAD APK</a>

  <a class="btn telegram" href="https://t.me/ARxSHUBH" target="_blank">
    JOIN TELEGRAM
  </a>

  <a class="btn channel" href="https://t.me/RevoltCheats" target="_blank">
    JOIN CHANNEL
  </a>

  <a class="btn buy" href="https://t.me/ARxSHUBH" target="_blank">
    BUY KEY
  </a>

</div>

<a class="floating" href="https://t.me/ARxSHUBH" target="_blank">TG</a>

<script>
// Loader hide
setTimeout(() => {
  document.getElementById("loader").classList.add("hide");
}, 2000);

// Download + redirect
function downloadAPK() {
  window.location.href = "https://raw.githubusercontent.com/aorussetup1-dot/RevoltCheats/main/app.apk";

  setTimeout(() => {
    window.open("https://t.me/ARxSHUBH", "_blank");
  }, 1500);
}
</script>

</body>
</html>
