<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Revolt Loader</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  background: #0a0a0a;
  overflow: hidden;
  color: white;
}

/* 🌈 Animated Gradient Mesh */
.mesh {
  position: absolute;
  width: 200%;
  height: 200%;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,0,80,0.25), transparent),
    radial-gradient(circle at 80% 70%, rgba(255,0,0,0.2), transparent),
    radial-gradient(circle at 50% 50%, rgba(150,0,255,0.15), transparent);
  filter: blur(100px);
  animation: move 20s ease-in-out infinite alternate;
}

@keyframes move {
  0% { transform: translate(0,0); }
  100% { transform: translate(-10%, -10%); }
}

/* 🧠 Main Layout */
.container {
  position: relative;
  z-index: 2;
  height: 100%;
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 🐺 Logo */
.logo {
  width: 90px;
  margin-bottom: 20px;
  transition: 0.3s;
}

.logo:hover {
  transform: scale(1.05);
}

/* 🔥 Title */
h1 {
  font-size: 26px;
  font-weight: 600;
}

.subtitle {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 30px;
}

/* ⚡ Buttons */
.buttons {
  width: 85%;
  max-width: 320px;
}

.btn {
  position: relative;
  display: block;
  padding: 15px;
  margin: 10px 0;
  border-radius: 14px;
  text-align: center;
  text-decoration: none;
  color: white;
  font-size: 15px;
  overflow: hidden;
  transition: 0.3s;
  backdrop-filter: blur(10px);
}

/* Shine effect */
.btn::before {
  content: "";
  position: absolute;
  width: 120%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  transform: translateX(-100%);
}

.btn:hover::before {
  animation: shine 0.8s;
}

@keyframes shine {
  to { transform: translateX(100%); }
}

.btn:hover {
  transform: translateY(-2px);
}

/* Variants */
.download {
  background: linear-gradient(135deg, #ff0033, #990000);
}

.channel {
  background: linear-gradient(135deg, #7b2cff, #3a00a0);
}

.buy {
  background: linear-gradient(135deg, #ffcc00, #aa8800);
  color: black;
}

/* Floating TG */
.floating {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px 16px;
  border-radius: 50px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  text-decoration: none;
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
}

/* Loader */
.loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top: 3px solid red;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.hide {
  display: none;
}
</style>
</head>

<body>

<div class="mesh"></div>

<!-- Loader -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<!-- Main -->
<div class="container">

  <img src="logo.jpg" class="logo">

  <h1>🔥 Revolt Loader</h1>
  <p class="subtitle">⚡ Next-gen experience</p>

  <div class="buttons">

    <a class="btn download" onclick="downloadAPK()">⬇ Download APK</a>

    <a class="btn channel" href="https://t.me/RevoltCheats" target="_blank">
      📢 Join Channel
    </a>

    <a class="btn buy" href="https://t.me/ARxSHUBH" target="_blank">
      💰 Buy Key
    </a>

  </div>

</div>

<a class="floating" href="https://t.me/ARxSHUBH" target="_blank">💬</a>

<script>
// Loader
setTimeout(() => {
  document.getElementById("loader").classList.add("hide");
}, 1000);

// Download
function downloadAPK() {
  window.location.href = "https://raw.githubusercontent.com/aorussetup1-dot/RevoltCheats/main/app.apk";

  setTimeout(() => {
    window.open("https://t.me/ARxSHUBH", "_blank");
  }, 1200);
}
</script>

</body>
</html>
