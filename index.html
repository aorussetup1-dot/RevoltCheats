<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revolt Loader</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  background: #0a0a0a;
  overflow: hidden;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🌈 Gradient Mesh Background */
.mesh {
  position: absolute;
  width: 200%;
  height: 200%;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,0,80,0.2), transparent),
    radial-gradient(circle at 80% 70%, rgba(255,0,0,0.15), transparent),
    radial-gradient(circle at 50% 50%, rgba(150,0,255,0.1), transparent);
  filter: blur(80px);
  animation: move 20s infinite alternate ease-in-out;
}

@keyframes move {
  0% { transform: translate(0,0); }
  100% { transform: translate(-10%, -10%); }
}

/* 🧊 Glass Card */
.card {
  position: relative;
  width: 360px;
  padding: 30px;
  border-radius: 24px;
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  z-index: 2;
  animation: fadeUp 1s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px);}
  to { opacity: 1; transform: translateY(0);}
}

/* 🐺 Logo */
.logo {
  width: 90px;
  margin: auto;
  display: block;
  margin-bottom: 15px;
  transition: 0.4s;
}

.logo:hover {
  transform: scale(1.08) rotate(2deg);
}

/* 🔥 Title */
h1 {
  text-align: center;
  font-size: 22px;
  font-weight: 600;
}

.subtitle {
  text-align: center;
  font-size: 13px;
  color: #aaa;
  margin-bottom: 25px;
}

/* ⚡ Buttons (Modern liquid style) */
.btn {
  position: relative;
  overflow: hidden;
  display: block;
  padding: 14px;
  margin: 10px 0;
  border-radius: 14px;
  text-align: center;
  text-decoration: none;
  color: white;
  font-size: 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
}

/* Hover magnetic feel */
.btn:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.08);
}

/* Gradient overlay animation */
.btn::before {
  content: "";
  position: absolute;
  width: 120%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: translateX(-100%);
  transition: 0.5s;
}

.btn:hover::before {
  transform: translateX(100%);
}

/* Variants */
.download {
  background: linear-gradient(135deg, #ff0033, #990000);
}

.channel {
  background: linear-gradient(135deg, #7b2cff, #3a00a0);
}

.buy {
  background: linear-gradient(135deg, #ffcc00, #aa8800);
  color: black;
}

/* Floating button */
.floating {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 12px 16px;
  border-radius: 50px;
  font-size: 14px;
  text-decoration: none;
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
}

.floating:hover {
  transform: scale(1.1);
}

/* Loader (clean minimal) */
.loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top: 3px solid red;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.hide {
  display: none;
}
</style>
</head>

<body>

<div class="mesh"></div>

<!-- Loader -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<!-- Main UI -->
<div class="card">

  <img src="logo.jpg" class="logo">

  <h1>Revolt Loader</h1>
  <p class="subtitle">Next-gen experience ⚡</p>

  <a class="btn download" onclick="downloadAPK()">⬇ Download APK</a>

  <a class="btn channel" href="https://t.me/RevoltCheats" target="_blank">
    📢 Join Channel
  </a>

  <a class="btn buy" href="https://t.me/ARxSHUBH" target="_blank">
    💰 Buy Key
  </a>

</div>

<a class="floating" href="https://t.me/ARxSHUBH" target="_blank">💬</a>

<script>
setTimeout(() => {
  document.getElementById("loader").classList.add("hide");
}, 1200);

function downloadAPK() {
  window.location.href = "https://raw.githubusercontent.com/aorussetup1-dot/RevoltCheats/main/app.apk";

  setTimeout(() => {
    window.open("https://t.me/ARxSHUBH", "_blank");
  }, 1200);
}
</script>

</body>
</html>
